version: '3.8'

services:
  # MySQL database — shared by joke app and ETL
  database:
    image: mysql:8.0
    container_name: joke-database
    profiles: [ "mysql" ]
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "4002:3306"
    volumes:
      # Persistent storage so data survives restarts
      - db-data:/var/lib/mysql
      # Run init.sql on first startup
      - ./db-init:/docker-entrypoint-initdb.d
    networks:
      - joke-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB database
  mongodb:
    image: mongo:7.0
    container_name: joke-database-mongo
    profiles: [ "mongo" ]
    environment:
      MONGO_INITDB_DATABASE: ${DB_NAME}
    ports:
      - "4002:27017"
    volumes:
      - mongo-data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    networks:
      - joke-network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Joke retrieval app — serves random jokes (UNCHANGED from Option 1)
  joke:
    build: ./joke-app
    container_name: joke-app
    ports:
      - "4000:3000"
    environment:
      DB_TYPE: ${DB_TYPE}
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}

    networks:
      - joke-network
    restart: unless-stopped

  # ETL service — consumes jokes from RabbitMQ queue and writes to DB
  etl:
    build: ./etl
    container_name: etl-app
    ports:
      - "4001:3001"
    environment:
      DB_TYPE: ${DB_TYPE}
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@${RABBITMQ_IP}:5672

    networks:
      - joke-network
    restart: unless-stopped

# Named volume for persistent DB storage
volumes:
  db-data:
  mongo-data:

    # Private bridge network for container-to-container communication
networks:
  joke-network:
    driver: bridge
